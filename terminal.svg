<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="70" viewBox="0 0 1000 70">
  <style>
    @keyframes typing {
      from { width: 0 }
      to { width: 950px }
    }
    @keyframes blink {
      0%, 50% { opacity: 1 }
      51%, 100% { opacity: 0 }
    }
    .terminal-text {
      animation: typing 6s steps(95) infinite;
      overflow: hidden;
      white-space: nowrap;
    }
    .cursor {
      animation: blink 1s infinite;
    }
  </style>

  <!-- Terminal background (Tenet dark mode) -->
  <rect x="0" y="0" width="1000" height="70" rx="12" fill="#0a0e27"/>
  <rect x="0" y="0" width="1000" height="70" rx="12" fill="none" stroke="#2d3561" stroke-width="2"/>

  <!-- Terminal header -->
  <rect x="0" y="0" width="1000" height="32" rx="12" fill="#0d1128"/>

  <!-- macOS traffic lights -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="16" r="6" fill="#28c940"/>

  <!-- Terminal title -->
  <text x="500" y="20" font-family="'SF Mono', 'Monaco', monospace" font-size="12" fill="#58a6ff" text-anchor="middle" opacity="0.7">akshaypasham — zsh</text>

  <!-- Terminal content area -->
  <g transform="translate(20, 58)">
    <!-- Prompt -->
    <text font-family="'SF Mono', 'Monaco', monospace" font-size="14" fill="#58a6ff" font-weight="bold">$</text>

    <!-- Typing text with clip path -->
    <clipPath id="textClip">
      <rect x="0" y="-18" class="terminal-text" height="24"/>
    </clipPath>

    <text x="18" font-family="'SF Mono', 'Monaco', monospace" font-size="14" fill="#8b949e" clip-path="url(#textClip)">DevOps: Choreographing Chaos | Scaling Across Dimensions | Engineering Controlled Impossibility ⚡</text>

    <!-- Blinking cursor -->
    <rect x="970" y="-16" width="2" height="18" fill="#58a6ff" class="cursor"/>
  </g>
</svg>