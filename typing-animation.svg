<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60">
  <defs>
    <style>
      @keyframes typing {
        0% { width: 0; }
        100% { width: 100%; }
      }
      @keyframes blink {
        0%, 49% { border-right-color: #58a6ff; }
        50%, 100% { border-right-color: transparent; }
      }
      .typing-text {
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 16px;
        font-weight: 500;
        fill: #8b949e;
        animation: typing 4s steps(85, end) 1s forwards;
        white-space: nowrap;
        overflow: hidden;
      }
      .cursor {
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 16px;
        fill: #58a6ff;
        animation: blink 0.7s infinite 5s;
      }
    </style>
  </defs>

  <!-- Typing text container -->
  <text class="typing-text" x="0" y="40">DevOps: Choreographing Chaos | Scaling Across Dimensions | Engineering Controlled Impossibility ⚡</text>

  <!-- Cursor that blinks -->
  <text class="cursor" x="790" y="40" font-weight="bold">|</text>
</svg>