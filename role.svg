<svg xmlns="http://www.w3.org/2000/svg" width="450" height="40">
  <defs>
    <style>
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .role-text {
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 16px;
        fill: #8b949e;
        animation: slideIn 1.5s ease-out 0.3s forwards;
        opacity: 0;
      }
    </style>
  </defs>
  <text class="role-text" x="0" y="25">DevOps Engineer | Cloud &amp; Infrastructure</text>
</svg>